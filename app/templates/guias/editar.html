<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Editar Guía</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">

    <div class="container">

        <span class="navbar-brand">

            Andean Explorer Tours

        </span>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow">

                <div class="card-header bg-warning">

                    <h3 class="text-center">

                        Editar Guía

                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Nombre

                            </label>

                            <input
                                type="text"
                                name="nombre"
                                class="form-control"
                                value="{{guia.nombre}}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Idiomas

                            </label>

                            <input
                                type="text"
                                name="idiomas"
                                class="form-control"
                                value="{{guia.idiomas}}">

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Certificaciones

                            </label>

                            <input
                                type="text"
                                name="certificaciones"
                                class="form-control"
                                value="{{guia.certificaciones}}">

                        </div>

                        <div class="text-center">

                            <button
                                class="btn btn-warning">

                                Actualizar

                            </button>

                            <a
                                href="/guias"
                                class="btn btn-secondary">

                                Cancelar

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>

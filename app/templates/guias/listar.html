<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guías</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), 
                        url("{{ url_for('static', filename='img/Guias.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Contenedor translúcido esmerilado */
        .glass-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* Transparencia para acoplar la tabla al diseño */
        .table {
            background: transparent !important;
            margin-bottom: 0;
        }

        /* Estilo personalizado para la cabecera de la tabla */
        .table-primary {
            --bs-table-bg: rgba(13, 110, 253, 0.85) !important;
            color: white !important;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">
            🏔 Andean Explorer Tours
        </span>
        <a href="/dashboard" class="btn btn-light text-primary fw-bold">
            <i class="bi bi-house-fill"></i> Dashboard
        </a>
    </div>
</nav>

<div class="container mt-5 mb-5">
    
    <div class="glass-container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="m-0 fw-bold text-dark">Lista de Guías</h1>
            <a href="/guias/nuevo" class="btn btn-success fw-semibold px-4">
                <i class="bi bi-plus-circle"></i> Nuevo Guía
            </a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Idiomas</th>
                        <th>Certificaciones</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for guia in guias %}
                    <tr>
                        <td class="fw-bold">{{guia.id}}</td>
                        <td>{{guia.nombre}}</td>
                        <td>
                            <i class="bi bi-translate text-primary me-1"></i> 
                            {{guia.idiomas}}
                        </td>
                        <td>
                            <i class="bi bi-patch-check-fill text-success me-1"></i> 
                            {{guia.certificaciones}}
                        </td>
                        <td>
                            <a href="/guias/editar/{{guia.id}}" class="btn btn-warning btn-sm fw-semibold me-1">
                                Editar
                            </a>
                            <a href="/guias/eliminar/{{guia.id}}" class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Desea eliminar este guía?')">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div> </div> </div>

</body>
</html>

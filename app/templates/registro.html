<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Andean Explorer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(
                rgba(0, 0, 0, 0.1), /* Capa oscura para el contraste */
                rgba(0, 0, 0, 0.1)
            ),
            url("{{ url_for('static', filename='img/fondo2.jpg') }}"); /* Misma imagen */
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Tarjeta translúcida idéntica al login */
        .card {
            background: rgba(255, 255, 255, 0.65)!important;
            backdrop-filter: blur(5px);
            border: none;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="row vh-100 justify-content-center align-items-center">

            <div class="col-md-6">

                <div class="card shadow-lg">

                    <div class="card-body p-5">

                        <h2 class="text-center mb-4">
                            Andean Explorer
                        </h2>

                        <h5 class="text-center text-secondary mb-4">
                            Crear Usuario
                        </h5>

                        <form method="POST">

                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input 
                                    type="text" 
                                    name="nombre" 
                                    class="form-control" 
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Correo</label>
                                <input 
                                    type="email" 
                                    name="email" 
                                    class="form-control" 
                                    required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Contraseña</label>
                                <input 
                                    type="password" 
                                    name="password" 
                                    class="form-control" 
                                    required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    Registrarse
                                </button>
                            </div>

                        </form>

                        <hr>

                        <div class="text-center">
                            <a href="/login" class="text-decoration-none">
                                Volver al Login
                            </a>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>


<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Editar Usuario</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">

    <div class="container">

        <span class="navbar-brand">

            Andean Explorer Tours

        </span>

    </div>

</nav>


<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-warning">

                    <h3 class="text-center">

                        Editar Usuario

                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Nombre

                            </label>

                            <input
                                type="text"
                                name="nombre"
                                class="form-control"
                                value="{{usuario.nombre}}"
                                required>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">

                                Correo Electrónico

                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                value="{{usuario.email}}"
                                required>

                        </div>


                        <div class="mb-4">

                            <label class="form-label">

                                Rol

                            </label>

                            <select
                                name="rol"
                                class="form-select">

                                <option
                                value="Administrador"
                                {% if usuario.rol=="Administrador" %}
                                selected
                                {% endif %}>

                                    Administrador

                                </option>

                                <option
                                value="Usuario"
                                {% if usuario.rol=="Usuario" %}
                                selected
                                {% endif %}>

                                    Usuario

                                </option>

                            </select>

                        </div>


                        <div class="text-center">

                            <button
                                class="btn btn-warning">

                                Actualizar

                            </button>

                            <a
                                href="/usuarios"
                                class="btn btn-secondary">

                                Cancelar

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>

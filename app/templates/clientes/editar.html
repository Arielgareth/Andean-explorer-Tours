
<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Editar Cliente</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">

    <div class="container">

        <span class="navbar-brand">

            Andean Explorer Tours

        </span>

    </div>

</nav>


<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow">

                <div class="card-header bg-warning">

                    <h3 class="text-center">

                        Editar Cliente

                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Nombres

                            </label>

                            <input
                                type="text"
                                name="nombres"
                                class="form-control"
                                value="{{cliente.nombres}}"
                                required>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">

                                Apellidos

                            </label>

                            <input
                                type="text"
                                name="apellidos"
                                class="form-control"
                                value="{{cliente.apellidos}}"
                                required>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">

                                Teléfono

                            </label>

                            <input
                                type="text"
                                name="telefono"
                                class="form-control"
                                value="{{cliente.telefono}}">

                        </div>


                        <div class="mb-3">

                            <label class="form-label">

                                Email

                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                value="{{cliente.email}}">

                        </div>


                        <div class="mb-4">

                            <label class="form-label">

                                Pasaporte

                            </label>

                            <input
                                type="text"
                                name="pasaporte"
                                class="form-control"
                                value="{{cliente.pasaporte}}">

                        </div>


                        <div class="text-center">

                            <button
                                class="btn btn-warning">

                                Actualizar

                            </button>

                            <a
                                href="/clientes"
                                class="btn btn-secondary">

                                Cancelar

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>

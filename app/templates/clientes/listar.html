<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            /* Coloca de fondo la imagen principal de tu carpeta static/img */
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), 
                        url("{{ url_for('static', filename='img/CLIENTES.jpeg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Contenedor de la tabla: blanco semi-transparente con desenfoque */
        .glass-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* Hace que la tabla sea transparente para acoplarse al diseño */
        .table {
            background: transparent !important;
            margin-bottom: 0;
        }

        /* Estilo personalizado para las cabeceras de la tabla */
        .table-primary {
            --bs-table-bg: rgba(13, 110, 253, 0.85) !important;
            color: white !important;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">
            Andean Explorer Tours
        </span>
        <a href="/dashboard" class="btn btn-light text-primary fw-bold">
            Dashboard
        </a>
    </div>
</nav>

<div class="container mt-5">
    
    <div class="glass-container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="m-0 fw-bold text-dark">Lista de Clientes</h1>
            <a href="/clientes/nuevo" class="btn btn-success fw-semibold px-4">
                Nuevo Cliente
            </a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Nombres</th>
                        <th>Apellidos</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Pasaporte</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cliente in clientes %}
                    <tr>
                        <td class="fw-bold">{{cliente.id}}</td>
                        <td>{{cliente.nombres}}</td>
                        <td>{{cliente.apellidos}}</td>
                        <td>{{cliente.telefono}}</td>
                        <td>{{cliente.email}}</td>
                        <td><span class="badge bg-secondary">{{cliente.pasaporte}}</span></td>
                        <td>
                            <a href="/clientes/editar/{{cliente.id}}" class="btn btn-warning btn-sm fw-semibold me-1">
                                Editar
                            </a>
                            <a href="/clientes/eliminar/{{cliente.id}}" class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Desea eliminar este cliente?')">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </div> </div>

</body>
</html>

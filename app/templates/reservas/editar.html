<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow">

                    <div class="card-header bg-warning text-dark">
                        <h3>
                            <i class="bi bi-pencil-square"></i>
                            Editar Reserva
                        </h3>
                    </div>

                    <div class="card-body">
                        <form method="POST">

                            <div class="mb-3">
                                <label>Cliente</label>
                                <select name="cliente" class="form-select">
                                    {% for cliente in clientes %}
                                    <option value="{{ cliente.id }}" {% if cliente.id == reserva.cliente_id %}selected{% endif %}>
                                        {{ cliente.nombres }} {{ cliente.apellidos }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label>Paquete</label>
                                <select name="paquete" class="form-select">
                                    {% for paquete in paquetes %}
                                    <option value="{{ paquete.id }}" {% if paquete.id == reserva.paquete_id %}selected{% endif %}>
                                        {{ paquete.nombre }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label>Guía</label>
                                <select name="guia" class="form-select">
                                    <option value="">-- Sin Guía Asignado --</option>
                                    {% for guia in guias %}
                                    <option value="{{ guia.id }}" {% if guia.id == reserva.guia_id %}selected{% endif %}>
                                        {{ guia.nombre }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label>Vehículo</label>
                                <select name="vehiculo" class="form-select">
                                    <option value="">-- Sin Vehículo Asignado --</option>
                                    {% for vehiculo in vehiculos %}
                                    <option value="{{ vehiculo.id }}" {% if vehiculo.id == reserva.vehiculo_id %}selected{% endif %}>
                                        {{ vehiculo.marca }} {{ vehiculo.modelo }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label>Fecha</label>
                                <input type="date" name="fecha" value="{{ reserva.fecha }}" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label>Cantidad de Personas</label>
                                <input type="number" name="personas" value="{{ reserva.personas }}" class="form-control">
                            </div>

                            <div class="mb-4">
                                <label>Estado</label>
                                <select name="estado" class="form-select">
                                    <option value="Pendiente" {% if reserva.estado == 'Pendiente' %}selected{% endif %}>Pendiente</option>
                                    <option value="Confirmada" {% if reserva.estado == 'Confirmada' %}selected{% endif %}>Confirmada</option>
                                    <option value="Cancelada" {% if reserva.estado == 'Cancelada' %}selected{% endif %}>Cancelada</option>
                                </select>
                            </div>

                            <button class="btn btn-warning">Actualizar</button>
                            <a href="/reservas" class="btn btn-secondary">Cancelar</a>

                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Andean Explorer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 1. Contenedor del video para que ocupe toda la pantalla y se quede de fondo */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            object-fit: cover; /* Evita que el video se deforme */
            z-index: -2; /* Lo manda al fondo de todo */
        }

        /* 2. Capa oscura por encima del video para que las letras se sigan leyendo bien */
        .capa-oscura {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.1); /* Controla la oscuridad aquí */
            z-index: -1; /* Por encima del video, pero por debajo del formulario */
        }

        /* 3. Estilo de la tarjeta translúcida */
        .card {
            background: rgba(255, 255, 255, 0.65)!important;
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <video autoplay muted loop playsinline class="video-bg">
        <source src="{{ url_for('static', filename='img/fondo.mp4') }}" type="video/mp4">
        Tu navegador no soporta videos en HTML5.
    </video>

    <div class="capa-oscura"></div>

    <div class="container">
        <div class="row vh-100 justify-content-center align-items-center">
            <div class="col-md-5">
                <div class="card shadow-lg">
                    <div class="card-body p-5">

                        <h2 class="text-center mb-4">Andean Explorer</h2>
                        <h5 class="text-center text-secondary mb-4">Iniciar Sesión</h5>

                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Contraseña</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Ingresar</button>
                            </div>
                        </form>

                        <hr>

                        <div class="text-center">
                            ¿No tienes una cuenta?
                            <a href="{{ url_for('auth.registro') }}">Registrarse</a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

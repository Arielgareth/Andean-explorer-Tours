<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nueva Factura</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow">

<div class="container">

<span class="navbar-brand fw-bold">

🧾 Andean Explorer Tours

</span>

<a
href="/facturas"
class="btn btn-light">

Volver

</a>

</div>

</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>

<i class="bi bi-file-earmark-plus"></i>

Nueva Factura

</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Pago Asociado

</label>

<select
name="pago"
class="form-select">

{% for pago in pagos %}

<option value="{{pago.id}}">

Pago #{{pago.id}}

- Bs. {{pago.monto}}

</option>

{% endfor %}

</select>

</div>


<div class="mb-3">

<label class="form-label">

Número de Factura

</label>

<input
type="text"
name="numero_factura"
class="form-control"
required>

</div>


<div class="mb-3">

<label class="form-label">

Fecha de Emisión

</label>

<input
type="date"
name="fecha_emision"
class="form-control"
required>

</div>


<div class="mb-3">

<label class="form-label">

NIT

</label>

<input
type="text"
name="nit"
class="form-control"
required>

</div>


<div class="mb-3">

<label class="form-label">

Razón Social

</label>

<input
type="text"
name="razon_social"
class="form-control"
required>

</div>


<div class="mb-4">

<label class="form-label">

Total

</label>

<input
type="number"
step="0.01"
name="total"
class="form-control"
required>

</div>


<button class="btn btn-success">

<i class="bi bi-save"></i>

Guardar

</button>

<a
href="/facturas"
class="btn btn-secondary">

Cancelar

</a>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>

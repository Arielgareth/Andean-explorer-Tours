<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            
            background: linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.25)), 
                        url("{{ url_for('static', filename='img/Factura.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Cambiamos la tarjeta normal por una translúcida con desenfoque */
        .card-glass {
            background: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: none !important;
            border-radius: 20px !important;
            overflow: hidden; /* Mantiene redondeada la cabecera */
        }

        /* Cabecera azul semi-transparente */
        .card-header {
            background: rgba(13, 110, 253, 0.9) !important;
            border-bottom: none;
            padding: 20px !important;
        }

        /* Transparencia adaptada a la tabla */
        .table {
            background: transparent !important;
        }

        .table-dark {
            --bs-table-bg: rgba(33, 37, 41, 0.9) !important;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">
            🧾 Andean Explorer Tours
        </span>
        <a href="/dashboard" class="btn btn-light text-primary fw-bold">
            <i class="bi bi-house-fill"></i> Dashboard
        </a>
    </div>
</nav>

<div class="container mt-5 mb-5">

    <div class="card card-glass shadow-lg">

        <div class="card-header text-white">
            <div class="d-flex justify-content-between align-items-center">
                <h3 class="m-0 fw-bold">
                    <i class="bi bi-receipt"></i> Facturas
                </h3>
                <a href="/facturas/nuevo" class="btn btn-success fw-semibold">
                    <i class="bi bi-plus-circle"></i> Nueva Factura
                </a>
            </div>
        </div>

        <div class="card-body p-4">

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Número</th>
                            <th>Fecha</th>
                            <th>NIT</th>
                            <th>Razón Social</th>
                            <th>Total</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                    {% for factura in facturas %}
                        <tr>
                            <td class="fw-bold">{{factura.id}}</td>
                            <td>
                                <span class="badge bg-secondary">N° {{factura.numero_factura}}</span>
                            </td>
                            <td>
                                <i class="bi bi-calendar-event text-muted me-1"></i>{{factura.fecha_emision}}
                            </td>
                            <td class="font-monospace text-dark">{{factura.nit}}</td>
                            <td class="text-uppercase fw-semibold">{{factura.razon_social}}</td>
                            <td>
                                <span class="badge bg-success fs-6 fw-semibold">
                                    Bs. {{factura.total}}
                                </span>
                            </td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a href="/facturas/editar/{{factura.id}}" class="btn btn-warning btn-sm fw-semibold">
                                        <i class="bi bi-pencil"></i> Editar
                                    </a>
                                    <a href="/facturas/eliminar/{{factura.id}}" class="btn btn-danger btn-sm"
                                       onclick="return confirm('¿Eliminar factura?')">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    {% endfor %}
                    </tbody>
                </table>
            </div> </div>

    </div>

</div>

</body>
</html>

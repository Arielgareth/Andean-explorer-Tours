
<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Editar Vehículo</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow">

    <div class="container">

        <span class="navbar-brand fw-bold">

            🚐 Andean Explorer Tours

        </span>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-warning">

                    <h3>

                        <i class="bi bi-pencil-square"></i>

                        Editar Vehículo

                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Marca

                            </label>

                            <input
                                type="text"
                                name="marca"
                                class="form-control"
                                value="{{vehiculo.marca}}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Modelo

                            </label>

                            <input
                                type="text"
                                name="modelo"
                                class="form-control"
                                value="{{vehiculo.modelo}}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Placa

                            </label>

                            <input
                                type="text"
                                name="placa"
                                class="form-control"
                                value="{{vehiculo.placa}}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Capacidad

                            </label>

                            <input
                                type="number"
                                name="capacidad"
                                class="form-control"
                                value="{{vehiculo.capacidad}}"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Estado

                            </label>

                            <select
                                name="estado"
                                class="form-select">

                                <option {% if vehiculo.estado=="Disponible" %}selected{% endif %}>
                                    Disponible
                                </option>

                                <option {% if vehiculo.estado=="Ocupado" %}selected{% endif %}>
                                    Ocupado
                                </option>

                                <option {% if vehiculo.estado=="En mantenimiento" %}selected{% endif %}>
                                    En mantenimiento
                                </option>

                            </select>

                        </div>

                        <button
                            class="btn btn-warning">

                            <i class="bi bi-arrow-repeat"></i>

                            Actualizar

                        </button>

                        <a
                            href="/vehiculos"
                            class="btn btn-secondary">

                            <i class="bi bi-x-circle"></i>

                            Cancelar

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>

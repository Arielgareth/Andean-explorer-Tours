<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Ruta Turística</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.25)), 
                        url("{{ url_for('static', filename='img/imagen.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.88) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: none !important;
            border-radius: 20px !important;
            overflow: hidden;
        }

        .card-header {
            background: rgba(25, 135, 84, 0.9) !important; /* Verde success translúcido */
            border-bottom: none;
            padding: 20px !important;
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.6) !important;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.9) !important;
            border-color: #198754;
            box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
        }

        label {
            font-weight: 600;
            color: #212529;
            margin-bottom: 6px;
        }

        .coord-box {
            background: rgba(0, 0, 0, 0.03);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            height: 100%;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">
            🏔 Andean Explorer Tours
        </span>
        <a href="/dashboard" class="btn btn-light text-primary fw-bold">
            <i class="bi bi-house-fill"></i> Dashboard
        </a>
    </div>
</nav>

<div class="container mt-5 mb-5">

    <div class="card card-glass shadow-lg">
        
        <div class="card-header text-white">
            <h3 class="m-0 fw-bold">
                <i class="bi bi-map-fill"></i> Nueva Ruta Turística
            </h3>
        </div>

        <div class="card-body p-4">
            <form method="POST">
                
                <div class="row mb-4">
                    <div class="col-md-4 mb-3">
                        <label><i class="bi bi-bookmark-star-fill text-success"></i> Nombre de la Ruta</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Ej. Ruta de las Capitales" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label><i class="bi bi-geo-fill text-secondary"></i> Origen (Nombre)</label>
                        <input type="text" name="origen" class="form-control" placeholder="Ej. La Paz" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label><i class="bi bi-geo-alt-fill text-danger"></i> Destino (Nombre)</label>
                        <input type="text" name="destino" class="form-control" placeholder="Ej. Sucre" required>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    
                    <div class="col-md-4">
                        <div class="coord-box">
                            <span class="d-block fw-bold text-primary mb-2"><i class="bi bi-compass"></i> 1. Coordenadas Origen</span>
                            <div class="row g-2">
                                <div class="col-6">
                                    <label class="small text-muted">Latitud</label>
                                    <input type="number" step="any" name="lat_origen" class="form-control" placeholder="-16.4943" required>
                                </div>
                                <div class="col-6">
                                    <label class="small text-muted">Longitud</label>
                                    <input type="number" step="any" name="lon_origen" class="form-control" placeholder="-68.1212" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="coord-box">
                            <span class="d-block fw-bold text-warning mb-2"><i class="bi bi-pin-angle-fill"></i> 2. Parada Intermedia (Opcional)</span>
                            <div class="row g-2">
                                <div class="col-6">
                                    <label class="small text-muted">Latitud</label>
                                    <input type="number" step="any" name="lat_punto1" class="form-control" placeholder="-17.9647">
                                </div>
                                <div class="col-6">
                                    <label class="small text-muted">Longitud</label>
                                    <input type="number" step="any" name="lon_punto1" class="form-control" placeholder="-67.1068">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="coord-box">
                            <span class="d-block fw-bold text-danger mb-2"><i class="bi bi-compass-fill"></i> 3. Coordenadas Destino</span>
                            <div class="row g-2">
                                <div class="col-6">
                                    <label class="small text-muted">Latitud</label>
                                    <input type="number" step="any" name="lat_destino" class="form-control" placeholder="-19.0353" required>
                                </div>
                                <div class="col-6">
                                    <label class="small text-muted">Longitud</label>
                                    <input type="number" step="any" name="lon_destino" class="form-control" placeholder="-65.2592" required>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label><i class="bi bi-image text-primary"></i> Nombre de la Imagen</label>
                        <input type="text" name="imagen" class="form-control" placeholder="Ej. ruta_lapaz_sucre.jpg" required>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label><i class="bi bi-shield-check text-success"></i> Servicios en Ruta</label>
                        <textarea name="servicios" class="form-control" rows="2" placeholder="Detalla los servicios (Almuerzo incluido, Asistencia médica, Guía de turismo)..." required></textarea>
                    </div>

                    <div class="col-md-12 mb-4">
                        <label><i class="bi bi-card-text text-primary"></i> Descripción del Recorrido</label>
                        <textarea name="descripcion" class="form-control" rows="3" placeholder="Escribe un resumen o las recomendaciones principales de la ruta..." required></textarea>
                    </div>
                </div>

                <hr class="opacity-10 mb-4">

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success fw-semibold px-4 py-2 shadow-sm">
                        <i class="bi bi-check-circle-fill me-1"></i> Guardar Ruta
                    </button>
                    <a href="/rutas" class="btn btn-secondary fw-semibold px-4 py-2 shadow-sm">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>

    </div>
</div>

</body>
</html>

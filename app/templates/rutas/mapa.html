<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Ruta Turística</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

    <style>
        body {
            background: #f5f5f5;
        }

        #mapa {
            height: 650px;
            border-radius: 20px;
            box-shadow: 0px 5px 20px rgba(0, 0, 0, .2);
            position: relative;
            z-index: 1;
        }

        .card {
            border: none;
            border-radius: 20px;
        }

        .alert {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container mt-4 mb-5">
    <div class="card shadow p-4">
        <h2 class="mb-4">Mapa de Ruta Turística</h2>

        <div class="row mb-4 g-3">
            <div class="col-md-3">
                <div class="alert alert-primary m-0 h-100">
                    <strong>Origen:</strong><br>
                    <span>{{ ruta.origen }}</span>
                </div>
            </div>

            <div class="col-md-3">
                <div class="alert alert-warning m-0 h-100">
                    <strong>Puntos Intermedios:</strong><br>
                    <span id="texto-paradas">Calculando...</span>
                </div>
            </div>

            <div class="col-md-3">
                <div class="alert alert-danger m-0 h-100">
                    <strong>Destino:</strong><br>
                    <span>{{ ruta.destino }}</span>
                </div>
            </div>

            <div class="col-md-3">
                <div class="alert alert-success m-0 h-100" id="panel-medidas">
                    <strong>Distancia Aérea (Python):</strong> {{ ruta.distancia }} km<br>
                    <strong>Tiempo Est.:</strong> {{ ruta.tiempo }}
                </div>
            </div>
        </div>

        <div id="mapa"></div>

        <div class="mt-4">
            <a href="/rutas" class="btn btn-secondary px-4">Volver</a>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
    // 1. Obtener coordenadas desde Flask (Mapeadas al modelo actual)
    let latOrigen = Number("{{ ruta.lat_origen }}");
    let lonOrigen = Number("{{ ruta.lon_origen }}");
    let latDestino = Number("{{ ruta.lat_destino }}");
    let lonDestino = Number("{{ ruta.lon_destino }}");

    // Sincronizado con la base de datos de un solo punto intermedio
    let latP1 = Number("{{ ruta.lat_intermedio if ruta.lat_intermedio else 0 }}");
    let lonP1 = Number("{{ ruta.lon_intermedio if ruta.lon_intermedio else 0 }}");

    // Inicializar mapa centrado en el origen con un zoom de 6
    var mapa = L.map('mapa').setView([latOrigen, lonOrigen], 6);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        attribution: '&copy; OpenStreetMap'
    }).addTo(mapa);

    // Arrays para estructurar las rutas viales y geodésicas
    let puntosGPS = [L.latLng(latOrigen, lonOrigen)];
    let lineasRectasCoordenadas = [[latOrigen, lonOrigen]]; 
    let contadorParadas = 0;

    // Marcador de Origen fijo
    L.marker([latOrigen, lonOrigen]).addTo(mapa).bindPopup("<b>Origen:</b> {{ ruta.origen }}");

    // Validar e inyectar Punto Intermedio si existe en la base de datos
    if (latP1 && lonP1 && latP1 !== 0) {
        puntosGPS.push(L.latLng(latP1, lonP1));
        lineasRectasCoordenadas.push([latP1, lonP1]);
        L.marker([latP1, lonP1]).addTo(mapa).bindPopup("<b>Parada Intermedia (Registrada)</b>");
        contadorParadas++;
    }

    // Añadir Destino final a la cola de trazados
    puntosGPS.push(L.latLng(latDestino, lonDestino));
    lineasRectasCoordenadas.push([latDestino, lonDestino]);
    L.marker([latDestino, lonDestino]).addTo(mapa).bindPopup("<b>Destino:</b> {{ ruta.destino }}");

    // Actualizar el indicador de paradas activas (Tarjeta Amarilla)
    document.getElementById('texto-paradas').innerText = contadorParadas + " parada(s) activa(s)";

    // 2. DIBUJAR LA LÍNEA RECTA GEODÉSICA (Color Rojo Discontinuo)
    var lineaRecta = L.polyline(lineasRectasCoordenadas, {
        color: 'red',
        weight: 3,
        dashArray: '10, 10',
        opacity: 0.7
    }).addTo(mapa).bindPopup("Línea Recta Geodésica (Cálculo Haversine)");

    // 3. DIBUJAR LA RUTA VIAL REAL (Color Azul Continuo)
    var controlGPS = L.Routing.control({
        waypoints: puntosGPS,
        routeWhileDragging: false,
        addWaypoints: false,
        draggableWaypoints: false,
        show: false // Oculta el panel de texto con instrucciones de giro a la izquierda/derecha
    }).addTo(mapa);

    // 4. CAPTURAR TELEMETRÍA DE CARRETERAS EN TIEMPO REAL
    controlGPS.on('routesfound', function(e) {
        var rutaReal = e.routes[0];
        var distCarretera = (rutaReal.summary.totalDistance / 1000).toFixed(2);
        
        var tiempoSegundos = rutaReal.summary.totalTime;
        var hrs = Math.floor(tiempoSegundos / 3600);
        var mins = Math.round((tiempoSegundos % 3600) / 60);

        // Reemplazar la tarjeta verde con la comparación de mediciones reales
        document.getElementById('panel-medidas').innerHTML = 
            `<strong>Línea Recta:</strong> {{ ruta.distancia }} km<br>` +
            `<strong>Carretera GPS:</strong> ${distCarretera} km<br>` +
            `<strong>Tiempo Real:</strong> ${hrs}h ${mins}min`;
    });
</script>

</body>
</html>

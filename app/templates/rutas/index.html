<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rutas Turísticas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.img-tabla-ruta{
width:100px;
height:70px;
object-fit:cover;
border-radius:10px;
}

</style>

</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold">
                🏔 Andean Explorer Tours
            </a>
            <a href="/dashboard" class="btn btn-light text-primary fw-bold">
                <i class="bi bi-house-fill"></i> Dashboard
            </a>
        </div>
    </nav>


<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<div class="d-flex justify-content-between">

<h3>

<i class="bi bi-geo-alt-fill"></i>

Rutas Turísticas

</h3>

<a href="/rutas/nuevo"
class="btn btn-success">

<i class="bi bi-plus-circle"></i>

Nueva Ruta

</a>

</div>

</div>

<div class="card-body">

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Nombre</th>

<th>Origen</th>

<th>Destino</th>

<th>Distancia</th>

<th>Tiempo</th>

<th>Imagen</th>

<th>Acciones</th>

</tr>

</thead>

<tbody>

{% for ruta in rutas %}

<tr>

<td>{{ruta.id}}</td>

<td>{{ruta.nombre}}</td>

<td>{{ruta.origen}}</td>

<td>{{ruta.destino}}</td>

<td>{{ruta.distancia}} km</td>

<td>{{ruta.tiempo}}</td>

<td>

<img
src="{{ url_for('static', filename='img/' + ruta.imagen) }}"
class="img-tabla-ruta">

</td>

<td>

<a
href="/rutas/mapa/{{ruta.id}}"
class="btn btn-primary btn-sm">

<i class="bi bi-map"></i>

Mapa

</a>

<a
href="/rutas/editar/{{ruta.id}}"
class="btn btn-warning btn-sm">

<i class="bi bi-pencil-square"></i>

Editar

</a>

<a
href="/rutas/eliminar/{{ruta.id}}"
class="btn btn-danger btn-sm"
onclick="return confirm('¿Eliminar ruta?')">

<i class="bi bi-trash"></i>

Eliminar

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</div>

</body>

</html>

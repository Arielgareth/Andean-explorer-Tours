<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Nuevo Paquete</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>

<i class="bi bi-plus-circle"></i>

Registrar Paquete Turístico

</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Nombre del paquete

</label>

<input
type="text"
name="nombre"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Destino

</label>

<input
type="text"
name="destino"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Duración

</label>

<input
type="text"
name="duracion"
class="form-control"
placeholder="3 días / 2 noches">

</div>

<div class="mb-3">

<label class="form-label">

Precio

</label>

<input
type="number"
step="0.01"
name="precio"
class="form-control"
required>

</div>

<div class="mb-4">

<label class="form-label">

Descripción

</label>

<textarea
name="descripcion"
rows="4"
class="form-control"></textarea>

</div>

<button
class="btn btn-success">

<i class="bi bi-save"></i>

Guardar

</button>

<a
href="/paquetes"
class="btn btn-secondary">

Cancelar

</a>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>

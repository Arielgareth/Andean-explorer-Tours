<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Nuevo Pago</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Registrar Pago</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Reserva</label>

<select
name="reserva"
class="form-select">

{% for reserva in reservas %}

<option value="{{reserva.id}}">

Reserva #{{reserva.id}}

</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Fecha Pago</label>

<input
type="date"
name="fecha_pago"
class="form-control">

</div>

<div class="mb-3">

<label>Monto</label>

<input
type="number"
step="0.01"
name="monto"
class="form-control">

</div>

<div class="mb-3">

<label>Método de Pago</label>

<select
name="metodo_pago"
class="form-select">

<option>Efectivo</option>

<option>Transferencia</option>

<option>Tarjeta</option>

<option>QR</option>

</select>

</div>

<div class="mb-4">

<label>Estado</label>

<select
name="estado"
class="form-select">

<option>Pendiente</option>

<option>Pagado</option>

</select>

</div>

<button class="btn btn-success">

Guardar

</button>

<a
href="/pagos"
class="btn btn-secondary">

Cancelar

</a>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
